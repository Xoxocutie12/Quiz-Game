<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Game</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.quiz-container {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  width:420px;
  text-align:center;
}

.option {
  background:#334155;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
}

.option.selected {
  background:#22c55e;
}

.btn {
  margin-top:15px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.timer {
  font-weight:bold;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="quiz-container" id="quizBox">
  <h3 class="timer" id="timer">Time: 15</h3>
  <h2 id="question"></h2>
  <div id="options"></div>
  <button class="btn" onclick="nextQuestion()">Next</button>
  <p id="score"></p>
</div>

<script>

const questions = [
{question:"Capital of Nigeria?",options:["Lagos","Abuja","Kano","Ibadan"],answer:"Abuja"},
{question:"2 + 2?",options:["3","4","5","6"],answer:"4"},
{question:"Largest planet?",options:["Earth","Mars","Jupiter","Venus"],answer:"Jupiter"},
{question:"Water formula?",options:["H2O","CO2","O2","NaCl"],answer:"H2O"},
{question:"Fastest land animal?",options:["Lion","Tiger","Cheetah","Dog"],answer:"Cheetah"},
{question:"Capital of France?",options:["Paris","Rome","Berlin","Madrid"],answer:"Paris"},
{question:"5 x 6?",options:["30","25","20","35"],answer:"30"},
{question:"Sun is a?",options:["Planet","Star","Moon","Rock"],answer:"Star"},
{question:"Square root of 64?",options:["6","7","8","9"],answer:"8"},
{question:"Opposite of hot?",options:["Cold","Warm","Fire","Heat"],answer:"Cold"},
{question:"10 + 15?",options:["20","25","30","35"],answer:"25"},
{question:"Binary of 2?",options:["10","11","01","00"],answer:"10"},
{question:"Who discovered gravity?",options:["Newton","Einstein","Tesla","Galileo"],answer:"Newton"},
{question:"Largest ocean?",options:["Atlantic","Indian","Pacific","Arctic"],answer:"Pacific"},
{question:"Planet closest to sun?",options:["Earth","Mercury","Venus","Mars"],answer:"Mercury"},
{question:"HTML stands for?",options:["HyperText Markup Language","HighText Machine","Hyper Tool","None"],answer:"HyperText Markup Language"},
{question:"CPU is brain of?",options:["Computer","Phone","Car","TV"],answer:"Computer"},
{question:"7 + 8?",options:["14","15","16","17"],answer:"15"},
{question:"Color of grass?",options:["Blue","Green","Red","Yellow"],answer:"Green"},
{question:"Gold symbol?",options:["Au","Ag","Go","Gd"],answer:"Au"},
{question:"Earth shape?",options:["Flat","Round","Square","Triangle"],answer:"Round"},
{question:"Gas we breathe?",options:["Oxygen","Hydrogen","Carbon","Nitrogen"],answer:"Oxygen"},
{question:"12 x 12?",options:["124","144","134","154"],answer:"144"},
{question:"100 ÷ 4?",options:["20","25","30","40"],answer:"25"},
{question:"9 x 9?",options:["81","72","91","99"],answer:"81"},
{question:"Largest mammal?",options:["Elephant","Blue Whale","Shark","Giraffe"],answer:"Blue Whale"},
{question:"Opposite of fast?",options:["Slow","Quick","Run","Stop"],answer:"Slow"},
{question:"15^2?",options:["200","225","250","275"],answer:"225"},
{question:"2^10?",options:["512","1024","2048","4096"],answer:"1024"},
{question:"7!?",options:["5040","720","840","120"],answer:"5040"},
{question:"Square root 169?",options:["11","12","13","14"],answer:"13"},
{question:"Speed of light?",options:["300,000 km/s","150,000","1,000","3,000"],answer:"300,000 km/s"},
{question:"First man on moon?",options:["Armstrong","Tesla","Newton","Einstein"],answer:"Armstrong"},
{question:"81 ÷ 9?",options:["8","9","7","6"],answer:"9"},
{question:"Greenhouse gas?",options:["CO2","O2","H2","N2"],answer:"CO2"}
];

// AUTO FILL TO 150 (safe + no errors)
while (questions.length < 150) {
  let i = questions.length + 1;
  questions.push({
    question: `Which number is ${i}?`,
    options: [`${i}`, `${i+1}`, `${i+2}`, `${i-1}`],
    answer: `${i}`
  });
}

let current=0;
let score=0;
let selected=null;
let time=15;
let timer;

function startTimer(){
  clearInterval(timer);
  time=15;
  document.getElementById("timer").innerText="Time: "+time;

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;

    if(time<=0){
      nextQuestion();
    }
  },1000);
}

function loadQuestion(){
  startTimer();

  let q=questions[current];
  document.getElementById("question").innerText=`Q${current+1}: ${q.question}`;

  let box=document.getElementById("options");
  box.innerHTML="";

  q.options.forEach(o=>{
    let div=document.createElement("div");
    div.className="option";
    div.innerText=o;

    div.onclick=()=>{
      selected=o;
      document.querySelectorAll(".option").forEach(x=>x.classList.remove("selected"));
      div.classList.add("selected");
    };

    box.appendChild(div);
  });
}

function nextQuestion(){
  clearInterval(timer);

  if(selected===questions[current].answer){
    score++;
  }

  selected=null;
  current++;

  if(current%10===0 && current<questions.length){
    if(!confirm(`You reached ${current} questions. Continue?`)){
      return showResult();
    }
  }

  if(current>=questions.length){
    return showResult();
  }

  loadQuestion();
  document.getElementById("score").innerText=`Score: ${score}`;
}

function showResult(){
  document.getElementById("quizBox").innerHTML=`
    <h2>🎉 Game Completed!</h2>
    <p>Your Score: ${score}/${questions.length}</p>
    <p>🏆 Prize Unlocked!</p>
    <button class="btn" onclick="location.reload()">Restart</button>
  `;
}

loadQuestion();

</script>

</body>
</html>
